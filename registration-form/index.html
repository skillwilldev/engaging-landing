<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css">
    <title>რეგისტრაციის ფორმა</title>
</head>

<body>
    <div class="container">
        <h1>რეგისტრაციის ფორმა</h1>
        <form action="/submit-registration" method="POST" enctype="multipart/form-data">
            <fieldset>
                <legend>პირადი ინფორმაცია</legend>

                <div class="form-group">
                    <label for="first_name">სახელი:</label>
                    <input type="text" id="first_name" name="first_name" placeholder="შეიყვანეთ სახელი" required
                        maxlength="50">
                </div>

                <div class="form-group">
                    <label for="user_email">ელ-ფოსტა:</label>
                    <input type="email" id="user_email" name="user_email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="user_password">პაროლი:</label>
                    <input type="password" id="user_password" name="user_password" required minlength="8">
                </div>

                <div class="form-group">
                    <label for="user_age">ასაკი:</label>
                    <input type="number" id="user_age" name="user_age" min="1" max="120">
                </div>

                <div class="form-group">
                    <label for="birth_date">დაბადების თარიღი:</label>
                    <input type="date" id="birth_date" name="birth_date" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>სქესი</legend>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="male" required> მამაკაცი
                    </label>
                    <label>
                        <input type="radio" name="gender" value="female"> ქალი
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>ინტერესები</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="interests" value="html"> HTML</label>
                    <label><input type="checkbox" name="interests" value="css"> CSS</label>
                    <label><input type="checkbox" name="interests" value="javascript"> JavaScript</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>აირჩიეთ კურსი</legend>
                <div class="form-group">
                    <label for="course_select">კურსი:</label>
                    <select id="course_select" name="course_select" required>
                        <option value="">-- აირჩიეთ --</option>
                        <option value="frontend">Front-End დეველოპმენტი</option>
                        <option value="backend">Back-End დეველოპმენტი</option>
                        <option value="design">UI/UX დიზაინი</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>დამატებითი ინფორმაცია</legend>
                <div class="form-group" style="flex-direction: column; align-items: flex-start;">
                    <label for="message_area">შეტყობინება:</label>
                    <textarea id="message_area" name="user_message" placeholder="დაწერეთ ტექსტი..."></textarea>
                </div>

                <div class="form-group">
                    <label for="file_upload">ატვირთეთ ფაილი:</label>
                    <input type="file" id="file_upload" name="user_file">
                </div>
            </fieldset>

            <fieldset>
                <legend>დადასტურება</legend>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="terms" required> ვეთანხმები წესებს
                    </label>
                </div>
            </fieldset>

            <div class="actions">
                <button type="submit">გაგზავნა</button>
                <button type="reset">გასუფთავება</button>
            </div>

        </form>
    </div>

</body>

</html>
